<script>
    // live2d-widget-v3 组件地址，用来加载 moc3 模型
    const widgetPath = "https://cdn.jsdelivr.net/gh/letere-gzj/live2d-widget-v3@main";

    // 你的模型静态资源仓库地址
    // 注意：这里用的是你的 GitHub tag：v1.0.0
    // 注意：最后一定要有 /
    const modelPath = "https://cdn.jsdelivr.net/gh/sorastyx/static-resources@v1.0.11/";

    const config = {
        path: {
            homePath: "/",
            modelPath: modelPath,
            cssPath: widgetPath + "/waifu.css",
            tipsJsonPath: widgetPath + "/waifu-tips.json",
            tipsJsPath: widgetPath + "/waifu-tips.js",
            live2dCorePath: widgetPath + "/Core/live2dcubismcore.js",
            live2dSdkPath: widgetPath + "/live2d-sdk.js"
        },

        // 工具栏
        tools: [
            "hitokoto",
            "asteroids",
            "express",
            "switch-model",
            "switch-texture",
            "photo",
            "info",
            "quit"
        ],

        // 模型拖拽
        drag: {
            enable: true,
            direction: ["x", "y"]
        },

        // 模型切换方式：order 顺序切换，random 随机切换
        switchType: "order"
    };

    // 异步加载 CSS / JS
    function loadExternalResource(url, type) {
        return new Promise((resolve, reject) => {
            let tag;

            if (type === "css") {
                tag = document.createElement("link");
                tag.rel = "stylesheet";
                tag.href = url;
            } else if (type === "js") {
                tag = document.createElement("script");
                tag.src = url;
            }

            if (tag) {
                tag.onload = () => resolve(url);
                tag.onerror = () => reject(new Error("Failed to load: " + url));
                document.head.appendChild(tag);
            } else {
                reject(new Error("Unknown resource type: " + type));
            }
        });
    }

    // 屏幕宽度 >= 768 时加载看板娘
    if (screen.width >= 768) {
        Promise.all([
            loadExternalResource(config.path.cssPath, "css"),
            loadExternalResource(config.path.live2dCorePath, "js"),
            loadExternalResource(config.path.live2dSdkPath, "js"),
            loadExternalResource(config.path.tipsJsPath, "js")
        ]).then(() => {
            initWidget({
                homePath: config.path.homePath,
                waifuPath: config.path.tipsJsonPath,
                cdnPath: config.path.modelPath,
                tools: config.tools,
                dragEnable: config.drag.enable,
                dragDirection: config.drag.direction,
                switchType: config.switchType
            });
        }).catch((error) => {
            console.error("Live2D load error:", error);
        });
    }
</script>
